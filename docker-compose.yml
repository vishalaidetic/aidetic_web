# ═══════════════════════════════════════════════════════════════════
#  Aidetic — Unified Docker Compose
#  Runs both the Next.js frontend and the FastAPI backend stack.
#
#  Env files:
#    .env.local      → Next.js (frontend)  – git-ignored
#    .env.backend    → FastAPI + services   – git-ignored
#
#  Quick start:
#    cp .env.example        .env.local
#    cp .env.backend.example .env.backend
#    docker compose up --build
# ═══════════════════════════════════════════════════════════════════

name: aidetic

# ─── Shared re-usable anchors ──────────────────────────────────────
x-backend-build: &backend-build
  build:
    context: ./backend/backend
    dockerfile: Dockerfile
  env_file:
    - .env.backend
  depends_on:
    db:
      condition: service_healthy

# ─── Services ──────────────────────────────────────────────────────
services:

  # ──────────────────────────────────────────────────────────────────
  # 1. NEXT.JS FRONTEND
  # ──────────────────────────────────────────────────────────────────
  frontend:
    container_name: aidetic_frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Point the server-side API client at the internal service name
      BRAIN_API_URL: "http://api-gateway:8000"
      # WebSocket URL must be publicly reachable from the browser
      # Override in .env.local if you expose the API on a different host
      NEXT_PUBLIC_BRAIN_WS_URL: "${NEXT_PUBLIC_BRAIN_WS_URL:-ws://localhost:8000}"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────
  # 2. FASTAPI API GATEWAY
  # ──────────────────────────────────────────────────────────────────
  api-gateway:
    <<: *backend-build
    container_name: brain_api_gateway
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
      CHROMA_HOST: chromadb
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────
  # 3. GRPC MICROSERVICES
  # ──────────────────────────────────────────────────────────────────
  employee-service:
    <<: *backend-build
    container_name: brain_employee_service
    ports:
      - "50051:50051"
    environment:
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: ["python", "-m", "apps.employeeService.grpc_handler"]

  project-service:
    <<: *backend-build
    container_name: brain_project_service
    ports:
      - "50052:50052"
    environment:
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: ["python", "-m", "apps.projectService.grpc_handler"]

  finance-service:
    <<: *backend-build
    container_name: brain_finance_service
    ports:
      - "50053:50053"
    environment:
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: ["python", "-m", "apps.financeService.grpc_handler"]

  # ──────────────────────────────────────────────────────────────────
  # 4. NEO4J KAFKA SYNC WORKER
  # ──────────────────────────────────────────────────────────────────
  neo4j-sync-worker:
    <<: *backend-build
    container_name: brain_neo4j_sync_worker
    environment:
      KAFKA_SERVERS: "kafka:9092"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
    depends_on:
      - kafka
      - neo4j
    command: ["python", "scripts/kafka_neo4j_consumer.py"]

  # ──────────────────────────────────────────────────────────────────
  # 5. INFRASTRUCTURE
  # ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: brain_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brain
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brain"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: brain_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: brain_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: brain_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20.0
    container_name: brain_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: brain_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

# ─── Persistent volumes ────────────────────────────────────────────
volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
