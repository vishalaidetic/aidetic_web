services:
  db:
    image: postgres:15
    container_name: brain_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brain
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d brain" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: brain_redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: brain_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: brain_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain_api_gateway
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
      NEO4J_URI: "bolt://neo4j:7687"
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      CHROMA_HOST: chromadb
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  employee-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain_employee_service
    ports:
      - "50051:50051"
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
    depends_on:
      db:
        condition: service_healthy
    command: [ "python", "-m", "apps.employeeService.grpc_handler" ]

  project-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain_project_service
    ports:
      - "50052:50052"
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
    depends_on:
      db:
        condition: service_healthy
    command: [ "python", "-m", "apps.projectService.grpc_handler" ]

  finance-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain_finance_service
    ports:
      - "50053:50053"
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_URL: "postgresql://postgres:postgres@db:5432/brain"
    depends_on:
      db:
        condition: service_healthy
    command: [ "python", "-m", "apps.financeService.grpc_handler" ]
  neo4j-sync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain_neo4j_sync_worker
    environment:
      KAFKA_SERVERS: "kafka:9092"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
    depends_on:
      - kafka
      - neo4j
    command: [ "python", "scripts/kafka_neo4j_consumer.py" ]

  neo4j:
    image: neo4j:5.20.0
    container_name: brain_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: brain_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
