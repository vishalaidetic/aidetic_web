syntax = "proto3";

package project.v1;

service ProjectService {
  rpc GetProject (GetProjectRequest) returns (ProjectResponse) {}
}

message GetProjectRequest {
  string project_id = 1;
}

message ProjectResponse {
  string id = 1;
  string name = 2;
  string project_type = 3;
  string client_id = 4;
  double budget_allocated = 5;
  string status = 6;
}
